<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Objective</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px 40px;
        }

        .logo {
            height: 50px;
            max-width: 200px;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            position: relative;
            padding-top: 0;
        }

        .login-form {
            position: relative;
            background-color: #1a1a1a;
            padding: 140px 20px 140px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            overflow: hidden;
        }

        .login-form h1 {
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
            font-size: 24px;
        }

        .form-group {
            position: absolute;
            width: calc(100% - 40px);
            left: 20px;
        }

        .form-group.top-group {
            top: 20vh;
        }

        .form-group.bottom-group {
            bottom: 20vh;
        }

        .bottom-group label {
            display: inline-block;
            transform: rotate(20deg);
            transform-origin: left center;
        }

        .form-group label {
            display: block;
            color: #ccc;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {   
            outline: none;
            border-color: #0066cc;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #0052a3;
        }

        .login-btn:active {
            background-color: #003d7a;
        }

        .error-message {
            color: #ff4444;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        .success-screen {
            display: none;
            justify-content: center;
            align-items: center;
            flex: 1;
            flex-direction: column;
            text-align: center;
        }

        .success-message {
            color: #00cc66;
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .logout-btn {
            padding: 12px 30px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .logout-btn:hover {
            background-color: #0052a3;
        }
    </style>
</head>
<body>
    <div class="header">
        <img width="180" height="38" loading="lazy" class="img img--fixed" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20180%2038'%3E%3C/svg%3E" alt="Objective" data-lazy-src="https://www.objective.com.br/wp-content/uploads/2020/11/logo.svg">
    </div>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <form class="login-form" onsubmit="handleLogin(event)">
            <h1>Login</h1>
            <div class="form-group top-group">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" placeholder="admin" required>
            </div>
            <div class="form-group bottom-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Entrar</button>
            <div class="error-message" id="errorMessage">Usuário ou senha inválidos</div>
        </form>
    </div>

    <!-- Success Screen -->
    <div id="successScreen" class="success-screen">
        <div class="success-message">✓ Você logou com sucesso</div>
        <button class="logout-btn" onclick="handleLogout()">Sair</button>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();

            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;
            const errorMessage = document.getElementById('errorMessage');

            if (usuario === 'admin' && senha === 'admin') {
                // Hide login screen and show success screen
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('successScreen').style.display = 'flex';
                errorMessage.style.display = 'none';
            } else {
                // Show error message
                errorMessage.style.display = 'block';
                document.getElementById('senha').value = '';
            }
        }

        function handleLogout() {
            // Reset form
            document.getElementById('usuario').value = '';
            document.getElementById('senha').value = '';

            // Show login screen and hide success screen
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('successScreen').style.display = 'none';
        }
    </script>
</body>
</html>
